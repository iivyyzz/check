<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hệ Thống Thời Gian Thực Đăng Ký</title>
    <style>
        body {
            font-family: 'Segoe UI', -apple-system, BlinkMacSystemFont, Roboto, Helvetica, Arial, sans-serif;
            background-image: url('https://i.pinimg.com/736x/47/e7/58/47e75837f70d33eb1ae436bd4628af7f.jpg'); 
            background-size: contain; 
            background-position: left center; 
            background-repeat: no-repeat;
            background-color: #ffffff; /* Nền trắng tinh toàn trang */
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
            position: relative;
        }

        body::before {
            content: "";
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(255, 255, 255, 0.15); 
            z-index: 1;
        }

        /* Khung chứa căn giữa màn hình */
        .container {
            position: relative;
            z-index: 2;
            width: 85%;
            max-width: 1200px;
            display: flex;
            flex-direction: column;
            align-items: center; 
            margin-top: -40px;
        }

        .title {
            font-size: 20px;
            color: #333333;
            font-weight: 400;
            margin-bottom: 0px;
            text-align: center;
            width: 100%;
        }

        /* ĐỒNG HỒ SỐ CĂN GIỮA - SIÊU TO KHỔNG LỒ */
        .time {
            font-size: 200px; 
            font-weight: 800; 
            font-family: Arial, Helvetica, sans-serif; 
            color: #262626; 
            line-height: 0.95;
            letter-spacing: -6px; 
            text-align: center;
            width: 100%;
            margin: 10px 0 0 0;
        }

        /* THAY ĐỔI: ÉP KHỐI NGÀY THÁNG DẠT HẲN SANG GÓC TRÁI DƯỚI ĐỒNG HỒ */
        .date-box {
            width: 100%;
            display: flex;
            justify-content: flex-start; /* Đổi thành flex-start để đẩy chữ sang bên trái */
            padding-left: 4%; /* Căn lề thụt vào một chút cho thẳng với mép chữ số đầu tiên */
            margin-top: -5px; 
        }

        .date {
            font-size: 34px; 
            color: #262626;
            font-weight: 400;
            white-space: nowrap;
        }

        .instruction {
            position: absolute;
            bottom: 25px;
            right: 40px; 
            font-size: 13px;
            color: #777777;
            font-weight: bold;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="title">Thời gian ở Thành phố Hồ Chí Minh, Việt Nam hiện tại:</div>
    
    <div class="time" id="clock">00:00:00</div>
    
    <div class="date-box">
        <div class="date" id="date-string">Đang đồng bộ...</div>
    </div>
</div>

<div class="instruction">
    * Chụp màn hình kèm cử chỉ tay để điểm danh *
</div>

<script>
    let currentTimestamp = null;

    // Hàm tính số tuần chuẩn
    function getWeekNumber(d) {
        d = new Date(Date.UTC(d.getFullYear(), d.getMonth(), d.getDate()));
        d.setUTCDate(d.getUTCDate() + 4 - (d.getUTCDay() || 7));
        var yearStart = new Date(Date.UTC(d.getUTCFullYear(),0,1));
        var weekNo = Math.ceil(( ( (d - yearStart) / 86400000) + 1)/7);
        return weekNo;
    }

    // Hàm viết hoa chữ cái đầu tiên chuẩn chỉnh chính tả tiếng Việt
    function formatStandardVietnameseDate(str) {
        if (!str) return str;
        let lower = str.toLowerCase();
        return lower.charAt(0).toUpperCase() + lower.slice(1);
    }

    async function fetchExactTime() {
        try {
            let response = await fetch('https://worldtimeapi.org/api/timezone/Asia/Ho_Chi_Minh');
            let data = await response.json();
            currentTimestamp = new Date(data.datetime).getTime();
        } catch (e) {
            try {
                let response = await fetch('https://timeapi.io/api/Time/current/zone?timeZone=Asia/Ho_Chi_Minh');
                let data = await response.json();
                currentTimestamp = new Date(data.dateTime).getTime();
            } catch (err) {
                console.log("Không thể kết nối API thời gian chuẩn.");
                if(!currentTimestamp) currentTimestamp = new Date().getTime();
            }
        }
    }

    setInterval(() => {
        if (currentTimestamp !== null) {
            currentTimestamp += 1000;
            let t = new Date(currentTimestamp);
            
            let h = String(t.getHours()).padStart(2, '0');
            let m = String(t.getMinutes()).padStart(2, '0');
            let s = String(t.getSeconds()).padStart(2, '0');
            document.getElementById('clock').innerText = `${h}:${m}:${s}`;

            let options = { weekday: 'long', day: 'numeric', month: 'long', year: 'numeric' };
            let rawDateStr = t.toLocaleDateString('vi-VN', options); 
            
            let formattedDate = formatStandardVietnameseDate(rawDateStr);
            let weekNum = getWeekNumber(t);
            
            document.getElementById('date-string').innerText = `${formattedDate}, tuần ${weekNum}`;
        }
    }, 1000);

    fetchExactTime();
    setInterval(fetchExactTime, 20000);
</script>

</body>
</html>
