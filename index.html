<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hệ Thống Thời Gian Thực Đăng Ký</title>
    <style>
        body {
            font-family: 'Segoe UI', -apple-system, BlinkMacSystemFont, Roboto, Helvetica, Arial, sans-serif;
            background-image: url('https://i.pinimg.com/736x/47/e7/58/47e75837f70d33eb1ae436bd4628af7f.jpg'); 
            background-size: contain; 
            background-position: right center; /* GIỮ HÌNH CU SHIN NẰM BÊN PHẢI MÀN HÌNH */
            background-repeat: no-repeat;
            background-color: #ffffff; 
            margin: 0;
            padding: 0;
            display: flex;
            /* ĐẨY TOÀN BỘ CỤM NỘI DUNG SANG BÊN TRÁI MÀN HÌNH (Vùng ô đỏ của bạn) */
            justify-content: flex-start; 
            align-items: center;
            height: 100vh;
            overflow: hidden;
            position: relative;
        }

        body::before {
            content: "";
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(255, 255, 255, 0.15); 
            z-index: 1;
        }

        /* Hộp chứa lớn nằm gọn bên góc trái */
        .container {
            position: relative;
            z-index: 2;
            width: 50%; /* Giới hạn chiều rộng chiếm nửa bên trái màn hình */
            padding-left: 6%; /* Khoảng cách lùi vào từ mép trái màn hình */
            display: flex;
            flex-direction: column;
            align-items: flex-start; /* Căn lề trái toàn bộ chữ bên trong */
            margin-top: -80px; /* Nhấc toàn bộ cụm chữ lên cao trùng khớp vùng đỏ */
        }

        /* THAY ĐỔI: Tiêu đề in đậm và to hơn theo yêu cầu */
        .title {
            font-size: 26px; /* Tăng kích thước chữ to hơn */
            color: #1a1a1a;
            font-weight: 800; /* Làm chữ in đậm hẳn lên */
            margin-bottom: 15px;
            text-align: left;
            width: 100%;
            letter-spacing: -0.5px;
        }

        /* Khối hiển thị chính chứa Đồng hồ và Ngày tháng xếp chồng sát nhau */
        .main-display {
            display: flex;
            flex-direction: column; /* Xếp đồng hồ trên, ngày tháng dưới */
            align-items: flex-end; /* Căn lề theo mép bên phải của khối chữ */
        }

        /* ĐỒNG HỒ SỐ NẰM GỌN BÊN TRÁI */
        .time {
            font-size: 160px; /* Kích thước siêu to rõ nét */
            font-weight: 800; 
            font-family: Arial, Helvetica, sans-serif; 
            color: #262626; 
            line-height: 0.9;
            letter-spacing: -5px;
            margin: 0;
        }

        /* THAY ĐỔI: Ngày tháng nằm ngay phía dưới bên phải của đồng hồ số */
        .date {
            font-size: 32px; 
            color: #262626;
            font-weight: 500;
            white-space: nowrap; 
            margin-top: 10px; /* Khoảng cách ngay dưới đáy của đồng hồ số */
            text-align: right; /* Ép chữ căn sát lề phải của đồng hồ */
        }

        .instruction {
            position: absolute;
            bottom: 25px;
            left: 60px; /* Chuyển dòng ghi chú nhỏ sang góc trái dưới cùng */
            font-size: 13px;
            color: #777777;
            font-weight: bold;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="title">Thời gian ở Thành phố Hồ Chí Minh, Việt Nam hiện tại:</div>
    
    <div class="main-display">
        <div class="time" id="clock">00:00:00</div>
        
        <div class="date" id="date-string">Đang đồng bộ...</div>
    </div>
</div>

<div class="instruction">
    * Chụp màn hình kèm cử chỉ tay để điểm danh *
</div>

<script>
    // timeOffset là khoảng chênh lệch động giữa Thời gian máy chủ chuẩn và Thiết bị cục bộ
    let timeOffset = 0;
    const VIETNAM_TIMEZONE_OFFSET = 7 * 60 * 60 * 1000; // Khóa cứng +7 tiếng (mili-giây) cho Việt Nam

    function getWeekNumber(d) {
        // Sử dụng UTC hoàn toàn để đảm bảo tính toán số tuần không bị ảnh hưởng bởi múi giờ máy khách
        const utcDate = new Date(Date.UTC(d.getUTCFullYear(), d.getUTCMonth(), d.getUTCDate()));
        utcDate.setUTCDate(utcDate.getUTCDate() + 4 - (utcDate.getUTCDay() || 7));
        const yearStart = new Date(Date.UTC(utcDate.getUTCFullYear(), 0, 1));
        return Math.ceil((((utcDate - yearStart) / 86400000) + 1) / 7);
    }

    function formatStandardVietnameseDate(dayOfWeek, day, month, year) {
        const weekdays = ["Chủ nhật", "Thứ hai", "Thứ ba", "Thứ tư", "Thứ năm", "Thứ sáu", "Thứ bảy"];
        return `${weekdays[dayOfWeek]}, ngày ${day} tháng ${month}, ${year}`;
    }

    // Cơ chế đồng bộ giờ máy chủ trung tâm chống gian lận
    async function syncWithServerTime() {
        const startTime = Date.now();
        try {
            // Fetch thẳng lên chính URL hiện tại kèm tham số ngẫu nhiên để ép máy chủ bypass CDN Cache
            const response = await fetch(window.location.origin + window.location.pathname + '?nocache=' + startTime, { 
                method: 'HEAD', 
                cache: 'no-store' 
            });
            
            const serverDateStr = response.headers.get('Date');
            if (serverDateStr) {
                const serverTimeUTC = new Date(serverDateStr).getTime(); // Luôn luôn là giờ chuẩn UTC từ GitHub
                const endTime = Date.now();
                const networkDelay = (endTime - startTime) / 2; // Bù sai số trễ gói tin mạng
                
                // Công thức tính khoảng offset chuẩn:
                // Giờ thực tế máy chủ (UTC) = Giờ thiết bị cục bộ + timeOffset
                timeOffset = (serverTimeUTC + networkDelay) - endTime;
            }
        } catch (e) {
            console.warn("Không thể đồng bộ thời gian thực tế với máy chủ GitHub. Đang sử dụng chế độ dự phòng.");
        }
    }

    // Render đồng hồ từ offset chuẩn
    function updateClock() {
        const localNow = Date.now();
        const currentMsUTC = localNow + timeOffset; // Giờ chuẩn UTC tại thời điểm hiện tại
        
        // Tạo đối tượng Date chứa giờ chuẩn của Việt Nam bằng cách cộng cứng lệch múi giờ (+7)
        // và triệt tiêu múi giờ cục bộ của thiết bị bằng phương thức getUTC...
        const vnTime = new Date(currentMsUTC + VIETNAM_TIMEZONE_OFFSET);
        
        const h = String(vnTime.getUTCHours()).padStart(2, '0');
        const m = String(vnTime.getUTCMinutes()).padStart(2, '0');
        const s = String(vnTime.getUTCSeconds()).padStart(2, '0');
        document.getElementById('clock').innerText = `${h}:${m}:${s}`;

        const rawDayOfWeek = vnTime.getUTCDay();
        const rawDay = vnTime.getUTCDate();
        const rawMonth = vnTime.getUTCMonth() + 1;
        const rawYear = vnTime.getUTCFullYear();

        const formattedDate = formatStandardVietnameseDate(rawDayOfWeek, rawDay, rawMonth, rawYear);
        const weekNum = getWeekNumber(vnTime);
        
        document.getElementById('date-string').innerText = `${formattedDate}, tuần ${weekNum}`;
    }

    // Chạy render đồng hồ liên tục 1 giây một lần
    setInterval(updateClock, 1000);

    // Chạy khởi tạo lần đầu ngay lập tức
    updateClock();

    // Gọi đồng bộ hóa lần đầu tiên khi tải trang
    syncWithServerTime().then(updateClock);

    // Đồng bộ định kỳ 15 giây/lần để luôn bắt kịp sai số và chống gian lận giữa chừng
    setInterval(syncWithServerTime, 15000);
</script>

</body>
</html>
