<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hệ Thống Thời Gian Thực Đăng Ký</title>
    <style>
        body {
            font-family: 'Segoe UI', -apple-system, BlinkMacSystemFont, Roboto, Helvetica, Arial, sans-serif;
            text-align: center;
            /* Sử dụng hình nền sáng để làm nổi bật chữ đen */
            background-image: url('https://i.pinimg.com/736x/e3/20/7f/e3207f35fe921619f10e7d012a5b1eeb.jpg'); 
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            background-attachment: fixed;
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
        }
        body::before {
            content: "";
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            /* Thay lớp phủ tối thành lớp phủ trắng mờ nhẹ giúp nền sáng lên rõ rệt */
            background: rgba(255, 255, 255, 0.4); 
            z-index: 1;
        }
        .container {
            position: relative;
            z-index: 2;
            padding: 0;
            max-width: 800px;
            width: 95%;
            /* Loại bỏ hoàn toàn mọi thuộc tính về background, border, border-radius và box-shadow */
        }
        .title {
            font-size: 22px;
            color: #2c3e50;
            margin-bottom: 0px;
            font-weight: 500;
        }
        /* THAY ĐỔI TRỌNG TÂM: Đồng hồ chữ đen siêu đậm, font vuông phẳng, không viền, không khung */
        .time {
            font-size: 130px; /* Tăng kích thước cực đại như hình mẫu */
            font-weight: 900; /* Độ dày chữ tối đa */
            font-family: Arial, Helvetica, sans-serif; /* Ép về font phẳng vuông cơ bản */
            color: #2b2b2b; /* Màu đen carbon đậm sắc nét */
            margin: 5px 0;
            line-height: 1.1;
            letter-spacing: -3px; /* Bóp sát khoảng cách các chữ số lại giống Time.is */
        }
        .date {
            font-size: 28px;
            color: #2b2b2b;
            margin-top: 5px;
            font-weight: 500;
        }
        .instruction {
            margin-top: 35px;
            font-size: 14px;
            color: #555555;
            font-weight: bold;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="title">Thời gian ở Việt Nam hiện tại:</div>
    
    <div class="time" id="clock">00:00:00</div>
    
    <div class="date" id="date-string">Đang đồng bộ...</div>
        
    <div class="instruction">
        * Nhân viên chụp ảnh màn hình này kèm cử chỉ tay yêu cầu để điểm danh *
    </div>
</div>

<script>
    let currentTimestamp = null;

    // Hàm tính toán tuần giống Time.is
    function getWeekNumber(d) {
        d = new Date(Date.UTC(d.getFullYear(), d.getMonth(), d.getDate()));
        d.setUTCDate(d.getUTCDate() + 4 - (d.getUTCDay() || 7));
        var yearStart = new Date(Date.UTC(d.getUTCFullYear(),0,1));
        var weekNo = Math.ceil(( ( (d - yearStart) / 86400000) + 1)/7);
        return weekNo;
    }

    function capitalizeWords(str) {
        return str.replace(/\b\w/g, l => l.toUpperCase());
    }

    async function fetchExactTime() {
        try {
            let response = await fetch('https://worldtimeapi.org/api/timezone/Asia/Ho_Chi_Minh');
            let data = await response.json();
            currentTimestamp = new Date(data.datetime).getTime();
        } catch (e) {
            try {
                let response = await fetch('https://timeapi.io/api/Time/current/zone?timeZone=Asia/Ho_Chi_Minh');
                let data = await response.json();
                currentTimestamp = new Date(data.dateTime).getTime();
            } catch (err) {
                console.log("Không thể kết nối API thời gian.");
                if(!currentTimestamp) currentTimestamp = new Date().getTime();
            }
        }
    }

    setInterval(() => {
        if (currentTimestamp !== null) {
            currentTimestamp += 1000;
            let t = new Date(currentTimestamp);
            
            let h = String(t.getHours()).padStart(2, '0');
            let m = String(t.getMinutes()).padStart(2, '0');
            let s = String(t.getSeconds()).padStart(2, '0');
            document.getElementById('clock').innerText = `${h}:${m}:${s}`;

            let options = { weekday: 'long', day: 'numeric', month: 'long', year: 'numeric' };
            let rawDateStr = t.toLocaleDateString('vi-VN', options); 
            let formattedDate = capitalizeWords(rawDateStr);

            let weekNum = getWeekNumber(t);
            document.getElementById('date-string').innerText = `${formattedDate}, tuần ${weekNum}`;
        }
    }, 1000);

    fetchExactTime();
    setInterval(fetchExactTime, 20000);
</script>

</body>
</html>
