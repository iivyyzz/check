<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hệ Thống Thời Gian Thực Đăng Ký</title>
    <style>
        body {
            font-family: 'Segoe UI', -apple-system, BlinkMacSystemFont, Roboto, Helvetica, Arial, sans-serif;
            background-image: url('https://i.pinimg.com/736x/47/e7/58/47e75837f70d33eb1ae436bd4628af7f.jpg'); 
            background-size: contain; 
            background-position: right center; /* GIỮ HÌNH CU SHIN NẰM BÊN PHẢI MÀN HÌNH */
            background-repeat: no-repeat;
            background-color: #ffffff; 
            margin: 0;
            padding: 0;
            display: flex;
            /* ĐẨY TOÀN BỘ CỤM NỘI DUNG SANG BÊN TRÁI MÀN HÌNH (Vùng ô đỏ của bạn) */
            justify-content: flex-start; 
            align-items: center;
            height: 100vh;
            overflow: hidden;
            position: relative;
        }

        body::before {
            content: "";
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(255, 255, 255, 0.15); 
            z-index: 1;
        }

        /* Hộp chứa lớn nằm gọn bên góc trái */
        .container {
            position: relative;
            z-index: 2;
            width: 50%; /* Giới hạn chiều rộng chiếm nửa bên trái màn hình */
            padding-left: 6%; /* Khoảng cách lùi vào từ mép trái màn hình */
            display: flex;
            flex-direction: column;
            align-items: flex-start; /* Căn lề trái toàn bộ chữ bên trong */
            margin-top: -80px; /* Nhấc toàn bộ cụm chữ lên cao trùng khớp vùng đỏ */
        }

        /* THAY ĐỔI: Tiêu đề in đậm và to hơn theo yêu cầu */
        .title {
            font-size: 26px; /* Tăng kích thước chữ to hơn */
            color: #1a1a1a;
            font-weight: 800; /* Làm chữ in đậm hẳn lên */
            margin-bottom: 15px;
            text-align: left;
            width: 100%;
            letter-spacing: -0.5px;
        }

        /* Khối hiển thị chính chứa Đồng hồ và Ngày tháng xếp chồng sát nhau */
        .main-display {
            display: flex;
            flex-direction: column; /* Xếp đồng hồ trên, ngày tháng dưới */
            align-items: flex-end; /* Căn lề theo mép bên phải của khối chữ */
        }

        /* ĐỒNG HỒ SỐ NẰM GỌN BÊN TRÁI */
        .time {
            font-size: 160px; /* Kích thước siêu to rõ nét */
            font-weight: 800; 
            font-family: Arial, Helvetica, sans-serif; 
            color: #262626; 
            line-height: 0.9;
            letter-spacing: -5px;
            margin: 0;
        }

        /* THAY ĐỔI: Ngày tháng nằm ngay phía dưới bên phải của đồng hồ số */
        .date {
            font-size: 32px; 
            color: #262626;
            font-weight: 500;
            white-space: nowrap; 
            margin-top: 10px; /* Khoảng cách ngay dưới đáy của đồng hồ số */
            text-align: right; /* Ép chữ căn sát lề phải của đồng hồ */
        }

        .instruction {
            position: absolute;
            bottom: 25px;
            left: 60px; /* Chuyển dòng ghi chú nhỏ sang góc trái dưới cùng */
            font-size: 13px;
            color: #777777;
            font-weight: bold;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="title">Thời gian ở Thành phố Hồ Chí Minh, Việt Nam hiện tại:</div>
    
    <div class="main-display">
        <div class="time" id="clock">00:00:00</div>
        
        <div class="date" id="date-string">Đang đồng bộ...</div>
    </div>
</div>

<div class="instruction">
    * Chụp màn hình kèm cử chỉ tay để điểm danh *
</div>

<script>
    let timeOffset = 0;
    let isTimeSynced = false;

    function getWeekNumber(d) {
        d = new Date(Date.UTC(d.getFullYear(), d.getMonth(), d.getDate()));
        d.setUTCDate(d.getUTCDate() + 4 - (d.getUTCDay() || 7));
        var yearStart = new Date(Date.UTC(d.getUTCFullYear(),0,1));
        var weekNo = Math.ceil(( ( (d - yearStart) / 86400000) + 1)/7);
        return weekNo;
    }

    function formatStandardVietnameseDate(str) {
        if (!str) return str;
        let lower = str.toLowerCase();
        return lower.charAt(0).toUpperCase() + lower.slice(1);
    }

    async function fetchExactTime() {
        const startTime = Date.now();
        let serverTime = null;

        // Danh sách các nguồn lấy giờ chuẩn (Ưu tiên các nguồn cực nhanh và không bị chặn)
        const apis = [
            async () => {
                // Thử lấy giờ chuẩn từ API của worldtimeapi
                let res = await fetch('https://worldtimeapi.org/api/timezone/Asia/Ho_Chi_Minh', { cache: 'no-store' });
                let data = await res.json();
                return new Date(data.datetime).getTime();
            },
            async () => {
                // Dự phòng 1: Dùng timeapi.io
                let res = await fetch('https://timeapi.io/api/Time/current/zone?timeZone=Asia/Ho_Chi_Minh', { cache: 'no-store' });
                let data = await res.json();
                return new Date(data.dateTime).getTime();
            },
            async () => {
                // Dự phòng 2: Lấy trực tiếp thời gian thực từ Header của chính Github để chống bị các bên chặn API
                let resHeader = await fetch(window.location.href, { method: 'HEAD', cache: 'no-store' });
                let dateStr = resHeader.headers.get('Date');
                return dateStr ? new Date(dateStr).getTime() : null;
            }
        ];

        for (let api of apis) {
            try {
                let time = await api();
                if (time) {
                    serverTime = time;
                    break; // Lấy thành công thì dừng lại ngay
                }
            } catch (e) {
                console.log("Nguồn lấy giờ gặp lỗi, thử nguồn dự phòng tiếp theo...");
            }
        }

        if (serverTime) {
            const endTime = Date.now();
            const networkDelay = (endTime - startTime) / 2;
            const accurateServerTime = serverTime + networkDelay;
            
            // Tính toán khoảng lệch chuẩn xác giữa giờ thực tế và giờ hệ thống máy khách
            timeOffset = accurateServerTime - endTime;
            isTimeSynced = true;
            console.log("Đã đồng bộ giờ thành công! Độ lệch máy: " + (timeOffset / 1000) + " giây.");
        }
    }

    function updateClock() {
        // Luôn cộng độ lệch chuẩn để ép đồng hồ chạy đúng giờ thực tế bất chấp giờ máy tính của bạn bị sai
        const currentMs = Date.now() + timeOffset;
        const t = new Date(currentMs);
        
        let h = String(t.getHours()).padStart(2, '0');
        let m = String(t.getMinutes()).padStart(2, '0');
        let s = String(t.getSeconds()).padStart(2, '0');
        document.getElementById('clock').innerText = `${h}:${m}:${s}`;

        let options = { weekday: 'long', day: 'numeric', month: 'long', year: 'numeric' };
        let rawDateStr = t.toLocaleDateString('vi-VN', options); 
        
        let formattedDate = formatStandardVietnameseDate(rawDateStr);
        let weekNum = getWeekNumber(t);
        
        document.getElementById('date-string').innerText = `${formattedDate}, tuần ${weekNum}`;
    }

    // Chạy cập nhật đồng hồ mỗi giây
    setInterval(updateClock, 1000);

    // Tiến hành đồng bộ giờ ngay khi tải trang và lặp lại mỗi 30 giây
    fetchExactTime().then(updateClock);
    setInterval(fetchExactTime, 30000);
</script>

</body>
</html>
