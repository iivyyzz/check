<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hệ Thống Thời Gian Thực Đăng Ký</title>
    <style>
        body {
            font-family: 'Segoe UI', -apple-system, BlinkMacSystemFont, Roboto, Helvetica, Arial, sans-serif;
            background-image: url('https://i.pinimg.com/736x/e3/20/7f/e3207f35fe921619f10e7d012a5b1eeb.jpg'); 
            background-size: contain; 
            background-position: left center; 
            background-repeat: no-repeat;
            background-color: #ffffff; /* THAY ĐỔI: Đồng bộ nền trắng tinh toàn bộ trang */
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
            position: relative;
        }

        .container {
            position: relative;
            z-index: 2;
            width: 90%;
            max-width: 1300px;
            display: flex;
            flex-direction: column;
            /* Đẩy toàn bộ cụm hiển thị lên phía trên để né bọt biển */
            margin-top: -120px; 
        }

        .title {
            font-size: 20px;
            color: #333333;
            font-weight: 400;
            margin-bottom: 10px;
            text-align: center;
            width: 100%;
        }

        /* Khung chứa bao gồm Đồng hồ (Trái) và Ngày tháng (Phải) */
        .main-display {
            display: flex;
            align-items: flex-end; /* Căn hàng theo cạnh đáy dưới */
            justify-content: center;
            width: 100%;
            gap: 40px; /* Khoảng cách giữa đồng hồ và ngày tháng */
        }

        /* ĐỒNG HỒ SỐ TO ĐẬM */
        .time {
            font-size: 180px; 
            font-weight: 800; 
            font-family: Arial, Helvetica, sans-serif; 
            color: #262626; 
            line-height: 0.9;
            letter-spacing: -4px;
            margin: 0;
        }

        /* PHẦN NGÀY THÁNG ĐƯỢC ĐẨY SANG GÓC PHẢI CỦA ĐỒNG HỒ */
        .date {
            font-size: 28px; 
            color: #262626;
            font-weight: 500;
            white-space: nowrap; /* Không cho chữ tự động xuống dòng */
            margin-bottom: 10px; /* Nhấc chữ lên một chút cho cân với đáy số đồng hồ */
        }

        .instruction {
            position: absolute;
            bottom: 25px;
            right: 40px; 
            font-size: 13px;
            color: #777777;
            font-weight: bold;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="title">Thời gian ở Thành phố Hồ Chí Minh, Việt Nam hiện tại:</div>
    
    <div class="main-display">
        <div class="time" id="clock">00:00:00</div>
        
        <div class="date" id="date-string">Đang đồng bộ...</div>
    </div>
</div>

<div class="instruction">
    * Chụp màn hình kèm cử chỉ tay để điểm danh *
</div>

<script>
    let currentTimestamp = null;

    // Hàm tính số tuần
    function getWeekNumber(d) {
        d = new Date(Date.UTC(d.getFullYear(), d.getMonth(), d.getDate()));
        d.setUTCDate(d.getUTCDate() + 4 - (d.getUTCDay() || 7));
        var yearStart = new Date(Date.UTC(d.getUTCFullYear(),0,1));
        var weekNo = Math.ceil(( ( (d - yearStart) / 86400000) + 1)/7);
        return weekNo;
    }

    // THAY ĐỔI: Hàm sửa lỗi chính tả - Chỉ viết in hoa chữ cái đầu tiên của toàn bộ chuỗi
    function formatStandardVietnameseDate(str) {
        if (!str) return str;
        let lower = str.toLowerCase();
        return lower.charAt(0).toUpperCase() + lower.slice(1);
    }

    async function fetchExactTime() {
        try {
            let response = await fetch('https://worldtimeapi.org/api/timezone/Asia/Ho_Chi_Minh');
            let data = await response.json();
            currentTimestamp = new Date(data.datetime).getTime();
        } catch (e) {
            try {
                let response = await fetch('https://timeapi.io/api/Time/current/zone?timeZone=Asia/Ho_Chi_Minh');
                let data = await response.json();
                currentTimestamp = new Date(data.dateTime).getTime();
            } catch (err) {
                console.log("Không thể kết nối API thời gian chuẩn.");
                if(!currentTimestamp) currentTimestamp = new Date().getTime();
            }
        }
    }

    setInterval(() => {
        if (currentTimestamp !== null) {
            currentTimestamp += 1000;
            let t = new Date(currentTimestamp);
            
            let h = String(t.getHours()).padStart(2, '0');
            let m = String(t.getMinutes()).padStart(2, '0');
            let s = String(t.getSeconds()).padStart(2, '0');
            document.getElementById('clock').innerText = `${h}:${m}:${s}`;

            let options = { weekday: 'long', day: 'numeric', month: 'long', year: 'numeric' };
            let rawDateStr = t.toLocaleDateString('vi-VN', options); 
            
            // Xử lý chuỗi ngày tháng chuẩn chỉnh (Chỉ hoa chữ đầu câu)
            let formattedDate = formatStandardVietnameseDate(rawDateStr);
            let weekNum = getWeekNumber(t);
            
            document.getElementById('date-string').innerText = `${formattedDate}, tuần ${weekNum}`;
        }
    }, 1000);

    fetchExactTime();
    setInterval(fetchExactTime, 20000);
</script>

</body>
</html>
