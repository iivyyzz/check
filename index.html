<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hệ Thống Thời Gian Thực Đăng Ký</title>
    <style>
        body {
            font-family: 'Segoe UI', -apple-system, BlinkMacSystemFont, Roboto, Helvetica, Arial, sans-serif;
            background-image: url('https://i.pinimg.com/736x/e3/20/7f/e3207f35fe921619f10e7d012a5b1eeb.jpg'); 
            background-size: contain; 
            background-position: left center; 
            background-repeat: no-repeat;
            background-color: #f4f4f4; 
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
            position: relative;
        }
        
        body::before {
            content: "";
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(255, 255, 255, 0.2); 
            z-index: 1;
        }

        .container {
            position: relative;
            z-index: 2;
            width: 85%;
            max-width: 1200px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .title {
            font-size: 24px;
            color: #2b2b2b;
            font-weight: 400;
            margin-bottom: 0px;
            text-align: center;
            width: 100%;
        }

        .time {
            font-size: 180px; 
            font-weight: 800; 
            font-family: Arial, Helvetica, sans-serif; 
            color: #262626; 
            margin: 10px 0;
            line-height: 1;
            letter-spacing: -5px; 
            text-align: center;
            width: 100%;
        }

        .date-box {
            width: 100%;
            display: flex;
            justify-content: flex-start; 
            padding-left: 5%; 
            margin-top: 10px;
        }

        .date {
            font-size: 32px; 
            color: #262626;
            font-weight: 400;
            text-align: left;
        }

        .instruction {
            position: absolute;
            bottom: 30px;
            right: 50px; 
            font-size: 14px;
            color: #666666;
            font-weight: bold;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="title">Thời gian ở Thành phố Hồ Chí Minh, Việt Nam hiện tại:</div>
    <div class="time" id="clock">00:00:00</div>
    <div class="date-box">
        <div class="date" id="date-string">Đang đồng bộ...</div>
    </div>
</div>

<div class="instruction">
    * Chụp màn hình kèm tay để điểm danh *
</div>

<script>
    let currentTimestamp = null;

    function getWeekNumber(d) {
        d = new Date(Date.UTC(d.getFullYear(), d.getMonth(), d.getDate()));
        d.setUTCDate(d.getUTCDate() + 4 - (d.getUTCDay() || 7));
        var yearStart = new Date(Date.UTC(d.getUTCFullYear(),0,1));
        var weekNo = Math.ceil(( ( (d - yearStart) / 86400000) + 1)/7);
        return weekNo;
    }

    // SỬA ĐỔI: Hàm chuẩn hóa chữ hoa đầu từ chính xác, loại bỏ lỗi in hoa lộn xộn
    function formatVietnameseDate(str) {
        return str.toLowerCase().replace(/\b\w/g, function(letter) {
            return letter.toUpperCase();
        });
    }

    async function fetchExactTime() {
        try {
            let response = await fetch('https://worldtimeapi.org/api/timezone/Asia/Ho_Chi_Minh');
            let data = await response.json();
            currentTimestamp = new Date(data.datetime).getTime();
        } catch (e) {
            try {
                let response = await fetch('https://timeapi.io/api/Time/current/zone?timeZone=Asia/Ho_Chi_Minh');
                let data = await response.json();
                currentTimestamp = new Date(data.dateTime).getTime();
            } catch (err) {
                console.log("Không thể kết nối API thời gian chuẩn.");
                if(!currentTimestamp) currentTimestamp = new Date().getTime();
            }
        }
    }

    setInterval(() => {
        if (currentTimestamp !== null) {
            currentTimestamp += 1000;
            let t = new Date(currentTimestamp);
            
            let h = String(t.getHours()).padStart(2, '0');
            let m = String(t.getMinutes()).padStart(2, '0');
            let s = String(t.getSeconds()).padStart(2, '0');
            document.getElementById('clock').innerText = `${h}:${m}:${s}`;

            let options = { weekday: 'long', day: 'numeric', month: 'long', year: 'numeric' };
            let rawDateStr = t.toLocaleDateString('vi-VN', options); 
            
            // Xử lý chuỗi ngày tháng chuẩn hóa viết hoa chữ đầu
            let formattedDate = formatVietnameseDate(rawDateStr);
            let weekNum = getWeekNumber(t);
            
            document.getElementById('date-string').innerText = `${formattedDate}, tuần ${weekNum}`;
        }
    }, 1000);

    fetchExactTime();
    setInterval(fetchExactTime, 20000);
</script>

</body>
</html>
